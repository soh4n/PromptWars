steps:
  # ── Step 1: Lint ────────────────────────────────────────────────
  - name: "python:3.12"
    id: lint
    entrypoint: bash
    args:
      - "-c"
      - "pip install ruff && ruff check api/"

  # ── Step 2: Unit Tests ─────────────────────────────────────────
  - name: "python:3.12"
    id: test-unit
    entrypoint: bash
    args:
      - "-c"
      - "pip install -r requirements-dev.txt && pytest tests/unit -q --tb=short --cov=api --cov-report=term-missing"

  # ── Step 3: Integration Tests ──────────────────────────────────
  - name: "python:3.12"
    id: test-integration
    entrypoint: bash
    args:
      - "-c"
      - "pip install -r requirements-dev.txt && pytest tests/integration -q --tb=short"

  # ── Step 4: Frontend Build Check ───────────────────────────────
  - name: "node:20"
    id: frontend-build
    entrypoint: bash
    args:
      - "-c"
      - "cd frontend && npm ci && npx tsc --noEmit && npm run build"

  # ── Step 5: Build Docker Image ─────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: build
    args:
      - "build"
      - "-t"
      - "asia-south1-docker.pkg.dev/$PROJECT_ID/promptwars/promptwars-api:$COMMIT_SHA"
      - "-t"
      - "asia-south1-docker.pkg.dev/$PROJECT_ID/promptwars/promptwars-api:latest"
      - "."

  # ── Step 6: Push Image ─────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: push
    args: ["push", "--all-tags", "asia-south1-docker.pkg.dev/$PROJECT_ID/promptwars/promptwars-api"]

  # ── Step 7: Deploy to Cloud Run ────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - promptwars-api
      - --image=asia-south1-docker.pkg.dev/$PROJECT_ID/promptwars/promptwars-api:$COMMIT_SHA
      - --region=asia-south1
      - --platform=managed
      - --allow-unauthenticated
      - --max-instances=20
      - --min-instances=1
      - --cpu=2
      - --memory=1Gi
      - --set-env-vars=GCP_PROJECT_ID=$PROJECT_ID,GCP_REGION=asia-south1,LOG_LEVEL=INFO
      - --quiet

images:
  - "asia-south1-docker.pkg.dev/$PROJECT_ID/promptwars/promptwars-api:$COMMIT_SHA"
  - "asia-south1-docker.pkg.dev/$PROJECT_ID/promptwars/promptwars-api:latest"

options:
  logging: CLOUD_LOGGING_ONLY
